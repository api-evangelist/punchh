aid: punchh
name: Punchh
description: >-
  Punchh, now part of PAR Technology and offered under the PAR Engagement
  brand, is an enterprise loyalty, offers, and customer engagement platform for
  restaurants. It unifies guest data from online ordering, mobile apps, POS,
  and kiosks into a single view so brands can run personalized loyalty and
  marketing programs. PAR exposes well-documented Punchh APIs through its
  developer portal covering platform functions, mobile, online ordering, POS
  and kiosk integration, and a webhooks manager, with sample collections
  published to Postman. Most integration surfaces require partner certification.
  Over 275 restaurant brands rely on Punchh to grow customer lifetime value.
