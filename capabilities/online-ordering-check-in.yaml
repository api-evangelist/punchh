    port: 9090
    transport: http
    description: MCP adapter for PAR Punchh Online Ordering and SSO API — Check-In. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-loyalty-check
      description: Create Loyalty Check-In
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: online-ordering-check-in.createOnlineOrderCheckin
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
