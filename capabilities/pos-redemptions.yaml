naftiko: 1.0.0-alpha2
info:
  label: PAR Punchh POS and Kiosk API — Redemptions
  description: 'PAR Punchh POS and Kiosk API — Redemptions. 3 operations. Lead operation: Possible Redemptions. Self-contained Naftiko capability covering one PAR Punchh business surface.'
  tags:
  - PAR Punchh
  - Loyalty
  - Redemptions
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PUNCHH_API_KEY: PUNCHH_API_KEY
capability:
  consumes:
  - type: http
    namespace: pos-redemptions
    baseUri: https://{server_name}.punchh.com
    description: PAR Punchh POS and Kiosk API — Redemptions business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PUNCHH_API_KEY}}'
      placement: header
    resources:
    - name: api-pos-redemptions-possible
      path: /api/pos/redemptions/possible
      operations:
      - name: getPosPossibleRedemptions
        method: POST
        description: Possible Redemptions
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-pos-redemptions
      path: /api/pos/redemptions
      operations:
      - name: createPosRedemption
        method: POST
        description: Create Redemption
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-pos-redemptions
      path: /api/pos/redemptions
      operations:
      - name: voidPosRedemption
        method: DELETE
        description: Void Redemption
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-redemptions-rest
    port: 8080
    description: REST adapter for PAR Punchh POS and Kiosk API — Redemptions. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/pos/redemptions/possible
      name: api-pos-redemptions-possible
      description: REST surface for Possible Redemptions.
      operations:
      - method: POST
        name: getPosPossibleRedemptions
        description: Possible Redemptions
        call: pos-redemptions.getPosPossibleRedemptions
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pos/redemptions
      name: api-pos-redemptions
      description: REST surface for Create Redemption.
      operations:
      - method: POST
        name: createPosRedemption
        description: Create Redemption
        call: pos-redemptions.createPosRedemption
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pos/redemptions
      name: api-pos-redemptions
      description: REST surface for Void Redemption.
      operations:
      - method: DELETE
        name: voidPosRedemption
        description: Void Redemption
        call: pos-redemptions.voidPosRedemption
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-redemptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for PAR Punchh POS and Kiosk API — Redemptions. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: possible-redemptions
      description: Possible Redemptions
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-redemptions.getPosPossibleRedemptions
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-redemption
      description: Create Redemption
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-redemptions.createPosRedemption
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: void-redemption
      description: Void Redemption
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: pos-redemptions.voidPosRedemption
      with: {}
      outputParameters:
      - type: object
        mapping: $.
