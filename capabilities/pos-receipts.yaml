naftiko: 1.0.0-alpha2
info:
  label: PAR Punchh POS and Kiosk API — Receipts
  description: 'PAR Punchh POS and Kiosk API — Receipts. 1 operations. Lead operation: Store Receipt Details. Self-contained Naftiko capability covering one PAR Punchh business surface.'
  tags:
  - PAR Punchh
  - Loyalty
  - Receipts
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PUNCHH_API_KEY: PUNCHH_API_KEY
capability:
  consumes:
  - type: http
    namespace: pos-receipts
    baseUri: https://{server_name}.punchh.com
    description: PAR Punchh POS and Kiosk API — Receipts business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PUNCHH_API_KEY}}'
      placement: header
    resources:
    - name: receipt-details
      path: /receipt_details
      operations:
      - name: storeReceiptDetails
        method: POST
        description: Store Receipt Details
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-receipts-rest
    port: 8080
    description: REST adapter for PAR Punchh POS and Kiosk API — Receipts. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/receipt-details
      name: receipt-details
      description: REST surface for Store Receipt Details.
      operations:
      - method: POST
        name: storeReceiptDetails
        description: Store Receipt Details
        call: pos-receipts.storeReceiptDetails
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-receipts-mcp
    port: 9090
    transport: http
    description: MCP adapter for PAR Punchh POS and Kiosk API — Receipts. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: store-receipt-details
      description: Store Receipt Details
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: pos-receipts.storeReceiptDetails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
