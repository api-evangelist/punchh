naftiko: 1.0.0-alpha2
info:
  label: PAR Punchh POS and Kiosk API — Configuration
  description: 'PAR Punchh POS and Kiosk API — Configuration. 2 operations. Lead operation: Location Configuration. Self-contained Naftiko capability covering one PAR Punchh business surface.'
  tags:
  - PAR Punchh
  - Loyalty
  - Configuration
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PUNCHH_API_KEY: PUNCHH_API_KEY
capability:
  consumes:
  - type: http
    namespace: pos-configuration
    baseUri: https://{server_name}.punchh.com
    description: PAR Punchh POS and Kiosk API — Configuration business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PUNCHH_API_KEY}}'
      placement: header
    resources:
    - name: api-pos-locations-configuration
      path: /api/pos/locations/configuration
      operations:
      - name: getPosLocationConfiguration
        method: GET
        description: Location Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-pos-meta
      path: /api/pos/meta
      operations:
      - name: getPosProgramMeta
        method: GET
        description: Program Meta
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-configuration-rest
    port: 8080
    description: REST adapter for PAR Punchh POS and Kiosk API — Configuration. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/pos/locations/configuration
      name: api-pos-locations-configuration
      description: REST surface for Location Configuration.
      operations:
      - method: GET
        name: getPosLocationConfiguration
        description: Location Configuration
        call: pos-configuration.getPosLocationConfiguration
        with: {}
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pos/meta
      name: api-pos-meta
      description: REST surface for Program Meta.
      operations:
      - method: GET
        name: getPosProgramMeta
        description: Program Meta
        call: pos-configuration.getPosProgramMeta
        with: {}
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for PAR Punchh POS and Kiosk API — Configuration. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: location-configuration
      description: Location Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-configuration.getPosLocationConfiguration
      with: {}
      outputParameters:
      - type: object
        mapping: $.
    - name: program-meta
      description: Program Meta
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-configuration.getPosProgramMeta
      with: {}
      outputParameters:
      - type: object
        mapping: $.
