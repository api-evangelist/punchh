naftiko: 1.0.0-alpha2
info:
  label: PAR Punchh Mobile API — Users
  description: 'PAR Punchh Mobile API — Users. 3 operations. Lead operation: Create User. Self-contained Naftiko capability covering one PAR Punchh business surface.'
  tags:
  - PAR Punchh
  - Loyalty
  - Users
  created: '2026-06-03'
  modified: '2026-06-03'
binds:
- namespace: env
  keys:
    PUNCHH_BEARER_TOKEN: PUNCHH_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: mobile-users
    baseUri: https://{server_name}.punchh.com
    description: PAR Punchh Mobile API — Users business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.PUNCHH_BEARER_TOKEN}}'
    resources:
    - name: api2-mobile-users
      path: /api2/mobile/users
      operations:
      - name: createMobileUser
        method: POST
        description: Create User
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api2-mobile-users
      path: /api2/mobile/users
      operations:
      - name: updateMobileUserProfile
        method: PUT
        description: Update User Profile
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api2-mobile-users-login
      path: /api2/mobile/users/login
      operations:
      - name: loginMobileUser
        method: POST
        description: Sign In
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: mobile-users-rest
    port: 8080
    description: REST adapter for PAR Punchh Mobile API — Users. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/mobile/users
      name: api2-mobile-users
      description: REST surface for Create User.
      operations:
      - method: POST
        name: createMobileUser
        description: Create User
        call: mobile-users.createMobileUser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mobile/users
      name: api2-mobile-users
      description: REST surface for Update User Profile.
      operations:
      - method: PUT
        name: updateMobileUserProfile
        description: Update User Profile
        call: mobile-users.updateMobileUserProfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mobile/users/login
      name: api2-mobile-users-login
      description: REST surface for Sign In.
      operations:
      - method: POST
        name: loginMobileUser
        description: Sign In
        call: mobile-users.loginMobileUser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mobile-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for PAR Punchh Mobile API — Users. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-user
      description: Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mobile-users.createMobileUser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user-profile
      description: Update User Profile
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mobile-users.updateMobileUserProfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: sign
      description: Sign In
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mobile-users.loginMobileUser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
